name: Google Keep
description: >-
  The Google Keep API provides programmatic access to Google Keep notes for
  enterprise administrators. It enables creating, listing, retrieving, and
  deleting notes, downloading note attachments, and managing note permissions.
  The API is designed for enterprise use cases where administrators need to
  manage Keep notes across their organization.
